spring.application.name=chinanko

# === BASE DE DATOS ===
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# === PUERTO ===
server.port=${PORT:8080}

# === SEGURIDAD ===
security.jwt.secret-key=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
security.jwt.expiration-time=1000

# === GRAPHQL ===
spring.graphql.graphiql.enabled=true

# ==========================================
# === CONFIGURACIÓN EUREKA CLIENT (RENDER) ===
# ==========================================

# 1. Habilitamos el cliente de nuevo (true)
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# 2. La URL de tu Servidor Eureka en Render
# DEBES crear una variable de entorno en Render llamada EUREKA_SERVER_URL
# El valor debe ser: https://nombre-de-tu-eureka.onrender.com/eureka/
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}

# 3. Configuración de Instancia para la Nube
# Esto ayuda a que Eureka sepa cómo contactar de vuelta a este servicio en el entorno de Render.
# 'RENDER_EXTERNAL_HOSTNAME' es una variable automática que pone Render.
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false

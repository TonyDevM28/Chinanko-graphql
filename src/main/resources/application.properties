spring.application.name=chinanko

# === BASE DE DATOS ===
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# === PUERTO ===
# Render usa la variable PORT. Si no, usa 8080.
server.port=${PORT:8080}

# === SEGURIDAD ===
security.jwt.secret-key=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
security.jwt.expiration-time=1000

# === GRAPHQL ===
spring.graphql.graphiql.enabled=true

# ==========================================
# === CORRECCIÓN CRÍTICA: MODO "NO EUREKA" ===
# ==========================================

# 1. Desactivamos Eureka para que no busque localhost:8082 y falle
eureka.client.enabled=${EUREKA_ENABLED:false}
eureka.client.register-with-eureka=${EUREKA_ENABLED:false}
eureka.client.fetch-registry=${EUREKA_ENABLED:false}

# 2. Borramos (o comentamos) la línea de defaultZone que causaba el error
# eureka.client.service-url.defaultZone=http://localhost:8082/eureka/  <-- BORRAR ESTO
